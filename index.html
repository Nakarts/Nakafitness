<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NakaFitness Elite+</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#0a0a0f;color:#fff;margin:0}
header{padding:15px;text-align:center;background:#111;font-weight:bold}
.container{padding:15px}
.card{background:#111;padding:15px;border-radius:12px;margin-bottom:15px}
button{padding:12px;border:none;border-radius:10px;background:#c8ff00;color:#000;font-weight:bold;width:100%;margin-top:10px}
.exercise video{width:100%;border-radius:10px;margin-top:10px}
.timer{font-size:22px;text-align:center;margin-top:10px;color:#c8ff00}
input{width:60px;padding:5px;border-radius:5px;border:none;text-align:center;margin:5px}
canvas{background:#111;border-radius:10px;padding:10px}
</style>

</head>

<body>

<header>🏋️ NakaFitness ELITE+</header>

<div class="container">

<div class="card">
<h2>Séance</h2>
<p id="workoutName"></p>
<button onclick="startWorkout()">Démarrer</button>
</div>

<div id="workout"></div>

<div class="card">
<h2>Progression</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const workouts = [
{
 name:"PULL",
 exercises:[
 {name:"Tractions", reps:8, sets:4, rest:90, video:"https://www.w3schools.com/html/mov_bbb.mp4"},
 {name:"Rowing", reps:10, sets:4, rest:90, video:"https://www.w3schools.com/html/mov_bbb.mp4"}
 ]
},
{
 name:"PUSH",
 exercises:[
 {name:"Chest Press", reps:10, sets:4, rest:90, video:"https://www.w3schools.com/html/mov_bbb.mp4"},
 {name:"Shoulder Press", reps:10, sets:3, rest:60, video:"https://www.w3schools.com/html/mov_bbb.mp4"}
 ]
},
{
 name:"LEGS",
 exercises:[
 {name:"Hack Squat", reps:10, sets:4, rest:90, video:"https://www.w3schools.com/html/mov_bbb.mp4"},
 {name:"Leg Curl", reps:12, sets:3, rest:60, video:"https://www.w3schools.com/html/mov_bbb.mp4"}
 ]
}
];

let index = localStorage.getItem("index") || 0;
let history = JSON.parse(localStorage.getItem("history")||"{}");
let stats = JSON.parse(localStorage.getItem("stats")||"{}");
let timer;
let chart;

function updateUI(){
 document.getElementById("workoutName").innerText = workouts[index].name;
}

function startWorkout(){
 const container = document.getElementById("workout");
 container.innerHTML = "";

 workouts[index].exercises.forEach((ex,i)=>{
  const last = history[ex.name] || "-";

  container.innerHTML += `
  <div class="card exercise">
    <h3>${ex.name}</h3>
    <p>${ex.sets} x ${ex.reps}</p>
    <p>Dernière perf: ${last}</p>
    <video src="${ex.video}" autoplay loop muted></video>
    <div>
      <input type="number" placeholder="kg" id="kg-${i}">
      <input type="number" placeholder="reps" id="reps-${i}">
    </div>
    <button onclick="validateSet(${i}, '${ex.name}', ${ex.rest})">Valider</button>
  </div>`;
 });

 index = (parseInt(index)+1)%workouts.length;
 localStorage.setItem("index", index);
}

function validateSet(i, name, rest){
 const kg = parseInt(document.getElementById(`kg-${i}`).value);
 const reps = parseInt(document.getElementById(`reps-${i}`).value);

 if(kg && reps){
  history[name] = kg+"kg x "+reps;
  localStorage.setItem("history", JSON.stringify(history));

  if(!stats[name]) stats[name] = [];
  stats[name].push(kg);

  if(stats[name].length >= 2){
    let last = stats[name][stats[name].length-1];
    let prev = stats[name][stats[name].length-2];
    if(last >= prev){
      alert("📈 Progression ! Ajoute +2.5kg la prochaine séance 💪");
    }
  }

  localStorage.setItem("stats", JSON.stringify(stats));
  updateChart(name);
 }

 startRest(rest);
}

function startRest(time){
 clearInterval(timer);
 const div = document.createElement("div");
 div.className="timer";
 document.body.appendChild(div);

 timer = setInterval(()=>{
  div.innerText = "Repos: " + time + "s";
  time--;
  if(time < 0){
    clearInterval(timer);
    div.remove();
  }
 },1000);
}

function updateChart(name){
 const data = stats[name] || [];
 const ctx = document.getElementById("chart");

 if(chart) chart.destroy();

 chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: data.map((_,i)=>"S"+(i+1)),
    datasets: [{data:data}]
  }
 });
}

updateUI();

if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
