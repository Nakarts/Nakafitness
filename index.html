<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NakaFitness</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    :root {
      --bg: #080808;
      --card: #121212;
      --text: #ffffff;
      --sub: #9a9a9a;
      --accent: #ff8c2a;
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    h1 { font-size: 28px; font-weight: 700; }
    p { color: var(--sub); font-size: 14px; }

    .container {
      max-width: 420px;
      margin: auto;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }

    .stat {
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
    }

    .categories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 15px;
    }

    .chip {
      padding: 8px 14px;
      border-radius: 999px;
      background: #1a1a1a;
      font-size: 13px;
      white-space: nowrap;
    }

    .chip.active {
      background: var(--accent);
      color: black;
      font-weight: 600;
    }

    .workout {
      position: relative;
      height: 140px;
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 15px;
    }

    .workout img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: black;
      font-weight: 600;
      text-align: center;
      margin-top: 20px;
      box-shadow: 0 10px 20px rgba(255,140,42,0.3);
    }

    .fab {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: black;
      box-shadow: 0 10px 30px rgba(255,140,42,0.5);
    }

  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h1>Ton progrès</h1>
      <div class="stats">
        <div class="stat"><strong>16</strong><span>Workouts</span></div>
        <div class="stat"><strong>10412</strong><span>Kcal</span></div>
        <div class="stat"><strong>03:21</strong><span>Heures</span></div>
      </div>
    </div>

    <div class="card">
      <h1>Catégories</h1>
      <div class="categories">
        <div class="chip active">All</div>
        <div class="chip">Chest</div>
        <div class="chip">Back</div>
        <div class="chip">Arms</div>
      </div>

      <div class="workout">
        <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" />
        <div class="overlay">
          <strong>Shoulder Workout</strong>
          <p>45 min</p>
        </div>
      </div>
    </div>

    <button class="btn">Commencer</button>
  </div>

  <div class="fab">+</div>

  <script>
    // FIX MKEYS (évite double déclaration)
    window.MKEYS = window.MKEYS || {
      version: "1.0",
      app: "NakaFitness"
    };

    console.log("MKEYS OK:", window.MKEYS);
  </script>
</body>
</html>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("Service Worker OK"))
      .catch(err => console.log("SW error", err));
  }
</script>
